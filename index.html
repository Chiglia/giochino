<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d0d1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="app_icon.jpg" />
    <title>Platform Game — Phaser 3</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      body {
        background: #0d0d1a;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      #orientation-warning {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #0d0d1a;
        z-index: 99999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #ffffff;
        font-family: "Courier New", Courier, monospace;
        padding: 20px;
      }
      @media only screen and (orientation: portrait) and (max-width: 900px) {
        #orientation-warning {
          display: flex;
        }
      }
      .warning-box {
        max-width: 320px;
        background: rgba(255, 255, 255, 0.03);
        border: 2px solid #56ffb8;
        border-radius: 12px;
        padding: 30px 20px;
        box-shadow: 0 0 20px rgba(86, 255, 184, 0.15);
      }
      .rotate-icon {
        font-size: 44px;
        margin-bottom: 20px;
        animation: rotateDevice 2.5s infinite ease-in-out;
        display: inline-block;
      }
      .warning-box h2 {
        font-size: 17px;
        color: #56ffb8;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .warning-box p {
        font-size: 12px;
        color: #a0a0b0;
        line-height: 1.6;
      }
      @keyframes rotateDevice {
        0% {
          transform: rotate(0deg);
        }
        40% {
          transform: rotate(-90deg);
        }
        60% {
          transform: rotate(-90deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      #pwa-install-banner {
        display: none;
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(13, 13, 26, 0.95);
        border: 2px solid #56ffb8;
        box-shadow: 0 0 15px rgba(86, 255, 184, 0.25);
        border-radius: 8px;
        padding: 8px 16px;
        z-index: 9999;
        align-items: center;
        gap: 16px;
        font-family: "Courier New", Courier, monospace;
        color: #ffffff;
        font-size: 11px;
        animation: slideUp 0.5s ease-out;
        max-width: 90vw;
        width: 460px;
        justify-content: space-between;
      }
      .pwa-text {
        letter-spacing: 0.5px;
        font-weight: bold;
      }
      .pwa-buttons {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #pwa-install-btn {
        background: #56ffb8;
        color: #0d0d1a;
        border: none;
        padding: 5px 12px;
        font-size: 10px;
        font-weight: bold;
        font-family: "Courier New", Courier, monospace;
        border-radius: 4px;
        cursor: pointer;
        transition:
          transform 0.1s ease,
          background 0.2s ease;
      }
      #pwa-install-btn:hover {
        background: #40df9f;
        transform: scale(1.05);
      }
      #pwa-close-btn {
        background: transparent;
        color: #888899;
        border: none;
        font-size: 14px;
        cursor: pointer;
        padding: 4px;
        transition: color 0.2s ease;
      }
      #pwa-close-btn:hover {
        color: #ff5555;
      }
      @keyframes slideUp {
        from {
          transform: translate(-50%, 40px);
          opacity: 0;
        }
        to {
          transform: translate(-50%, 0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="orientation-warning">
      <div class="warning-box" id="warning-card">
        <div class="rotate-icon" id="warning-icon">📱</div>
        <h2 id="warning-title">Ruota il dispositivo</h2>
        <p id="warning-desc">
          Per giocare al meglio su smartphone o tablet, attiva la rotazione automatica e usa lo
          schermo in orizzontale.
        </p>
      </div>
    </div>

    <!-- Banner d'installazione PWA personalizzato -->
    <div id="pwa-install-banner">
      <span class="pwa-text">🎮 Gioca a schermo intero! Installa l'App</span>
      <div class="pwa-buttons">
        <button id="pwa-install-btn">INSTALLA</button>
        <button id="pwa-close-btn">✖</button>
      </div>
    </div>

    <!-- type="module" abilita gli import/export ES6 tra i file -->
    <script type="module" src="src/main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then((reg) => console.log("Service Worker registrato con successo:", reg.scope))
            .catch((err) => console.error("Errore registrazione Service Worker:", err));
        });
      }

      // Logica del prompt di installazione PWA
      let deferredPrompt;
      const installBanner = document.getElementById("pwa-install-banner");
      const installBtn = document.getElementById("pwa-install-btn");
      const closeBtn = document.getElementById("pwa-close-btn");

      window.addEventListener("beforeinstallprompt", (e) => {
        // Previene la comparsa del prompt nativo del browser automatico
        e.preventDefault();
        // Salva l'evento
        deferredPrompt = e;
        // Mostra il banner personalizzato
        installBanner.style.display = "flex";
      });

      installBtn.addEventListener("click", async () => {
        if (!deferredPrompt) return;
        // Mostra il prompt nativo
        deferredPrompt.prompt();
        // Attendi la risposta dell'utente
        const { outcome } = await deferredPrompt.userChoice;
        console.log("Risposta installazione utente:", outcome);
        // Resetta la variabile
        deferredPrompt = null;
        // Nascondi il banner
        installBanner.style.display = "none";
      });

      closeBtn.addEventListener("click", () => {
        installBanner.style.display = "none";
      });
    </script>
  </body>
</html>
